<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do You Know Me? 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    color: #fff;
    overflow-x: hidden;
}

/* Floating hearts */
.heart {
    position: fixed;
    color: rgba(255,255,255,0.6);
    animation: float 6s linear infinite;
    z-index: 0;
}

@keyframes float {
    0% { transform: translateY(100vh) scale(1); }
    100% { transform: translateY(-10vh) scale(1.5); }
}

/* Container */
.container {
    position: relative;
    z-index: 1;
    padding: 20px;
}

/* Title */
h1 {
    font-size: 22px;
    margin-top: 20px;
}

/* Glass card */
.quiz-box {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    max-width: 400px;
    margin: 20px auto;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Question */
#question {
    font-size: 18px;
}

/* Buttons */
button {
    display: block;
    margin: 10px auto;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255,255,255,0.3);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
}

button:active {
    transform: scale(0.97);
}

button:hover {
    background: rgba(255,255,255,0.6);
    color: #ff4d6d;
}

/* Small screens */
@media (max-width: 400px) {
    h1 { font-size: 18px; }
    #question { font-size: 16px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>💖 How Well Do You Know Me? 💖</h1>

    <div class="quiz-box">
        <h2 id="question"></h2>
        <div id="answers"></div>
    </div>
</div>

<script>
// Floating hearts 💕
for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 18 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);
}

// QUIZ QUESTIONS 💌 (edit here)
const quiz = [
    {
        question: "Where did we first meet? 💕",
        answers: ["School", "At ur building", "College", "Party"],
        correct: 1
    },
    {
        question: "Mujhe sabse jyada kya pasand hai ? 💖",
        answers: ["Sleeping", "Dancing", "You ❤️", "Food"],
        correct: 2
    },
    {
        question: "Mera fav colour? 🎀",
        answers: ["Black", "Pink", "Blue", "White"],
        correct: 0
    },
    {
        question: "Mai tujhe kya naam se bulati hu? 😘",
        answers: ["Pupu", "Chinnu", "Bacha", "All of these"],
        correct: 3
    }
];

let current = 0;
let score = 0;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;
    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((ans, index) => {
        const btn = document.createElement("button");
        btn.innerText = ans;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });
}

function checkAnswer(index) {
    if (index === quiz[current].correct) {
        score++;
    }
    current++;
    if (current < quiz.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    let message = "";
    if (score === quiz.length) {
        message = "😭💖 You know me perfectly!! I love you sooo much Pupu ❤️";
    } else if (score >= 2) {
        message = "🥺💕 You know me pretty well! Keep loving me more 😘";
    } else {
        message = "😜 You need more time with me hehe ❤️";
    }

    document.querySelector(".quiz-box").innerHTML = `
        <h2>You scored ${score}/${quiz.length} 💕</h2>
        <p>${message}</p>
        <button onclick="location.reload()">Play Again 🔁</button>
    `;
}

loadQuestion();
</script>

</body>
</html>
